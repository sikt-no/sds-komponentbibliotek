lint:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run postinstall
    - npm run lint
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

test-unit:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run postinstall
    - npm run test
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    expire_in: 1 days
    reports:
      junit:
        - junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

test-e2e:
  stage: test
  #  image: mcr.microsoft.com/playwright:v1.58.2-noble
  extends: .npm_cache
  parallel:
    matrix:
      - SHARD_INDEX: [1, 2, 3, 4, 5, 6]
        SHARD_TOTAL: 6
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run postinstall
    - npx playwright install --with-deps
    - npm run test:e2e -- --shard=$SHARD_INDEX/$SHARD_TOTAL
  artifacts:
    expire_in: 1 days
    paths:
      - playwright/
    reports:
      junit:
        - results.xml
    when: always
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

test-e2e-update-snapshots:
  stage: test
  extends: .npm_cache
  id_tokens:
    VAULT_ID_TOKEN:
      aud: $VAULT_SERVER_URL
  secrets:
    CI_TOKEN:
      vault: "gitlab/${CI_PROJECT_PATH}/ci-token@secret"
      token: $VAULT_ID_TOKEN
      file: false
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run postinstall
    - npx playwright install --with-deps
    - npm run test:e2e -- --update-snapshots=changed
  after_script:
    - git config user.name "CI Pipeline"
    - git config user.email "cipipeline@example.com"
    - git add "packages/**/playwright/**/*.png"
    - >
      git commit -m "test: update playwright snapshots"
    - git remote set-url --push origin "https://CI_TOKEN:$CI_TOKEN@gitlab.sikt.no/designsystem/sds-komponentbibliotek.git"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true
