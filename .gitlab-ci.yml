default:
  image: node:22.16.0
  interruptible: true

include:
  - component: gitlab.sikt.no/platon/ci-components/docker/docker@2.0.0
  - component: gitlab.sikt.no/platon/ci-components/imagescan/imagescan@2.0.0
  - component: gitlab.sikt.no/platon/ci-components/deploy/deploy@1.3.2

variables:
  KUBE_PROD_DOMAIN: designsystem.sikt.no
  KUBE_TEST_ID: komponentbibliotek
  HTTP_PORT: "80"
  REPLICAS: "1"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

.npm_cache:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm
    policy: pull

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

stages:
  - .pre
  - build
  - test
  - deploy
  - .post

install:
  stage: .pre
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm pkg delete scripts.postinstall
    - npm ci --cache .npm
  cache:
    policy: pull-push
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

lint:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run lint
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

test-unit:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run test
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    expire_in: 1 days
    reports:
      junit:
        - junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

test-e2e:
  stage: test
  #  image: mcr.microsoft.com/playwright:v1.40.0-jammy
  extends: .npm_cache
  parallel:
    matrix:
      - SHARD_INDEX: [1, 2, 3, 4, 5]
        SHARD_TOTAL: 5
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npx playwright install --with-deps
    - npm run test:e2e -- --shard=$SHARD_INDEX/$SHARD_TOTAL
  artifacts:
    expire_in: 1 days
    paths:
      - playwright/
    reports:
      junit:
        - results.xml
    when: always
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

test-e2e-update-snapshots:
  stage: test
  extends: .npm_cache
  id_tokens:
    VAULT_ID_TOKEN:
      aud: $VAULT_SERVER_URL
  secrets:
    CI_TOKEN:
      vault: "gitlab/${CI_PROJECT_PATH}/ci-token@secret"
      token: $VAULT_ID_TOKEN
      file: false
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npx playwright install --with-deps
    - npm run test:e2e -- --update-snapshots=changed
  after_script:
    - git config user.name "CI Pipeline"
    - git config user.email "cipipeline@example.com"
    - git add "packages/**/playwright/**/*.png"
    - >
      git commit -m "test: update playwright snapshots"
    - git remote set-url --push origin "https://$CI_TOKEN@gitlab.sikt.no/designsystem/sds-komponentbibliotek.git"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true

.vuln:
  stage: test
  extends: .platon-imagescan
  script:
    - trivy fs --cache-dir .trivycache/ --dependency-tree ./
    - trivy fs --cache-dir .trivycache/ -f json -o gl-container-scanning-report.json ./
    - trivy fs --cache-dir .trivycache/ -f cyclonedx -o gl-sbom.cdx.json ./
    - trivy fs --cache-dir .trivycache/ --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./
  cache:
    paths:
      - .trivycache/
  artifacts:
    expire_in: 1 days
    when: always
    reports:
      container_scanning: gl-container-scanning-report.json
      cyclonedx: gl-sbom.cdx.json
  needs: []

vuln:
  extends: .vuln
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

vuln-schedule:
  extends: .vuln
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

vuln-schedule-report:
  stage: .post
  script:
    - >
      curl --request POST --header "Content-Type: application/json" --data "{\"text\":\"Vulnerability audit failed on $CI_COMMIT_BRANCH <$CI_PIPELINE_URL|$CI_PIPELINE_ID>\"}" "${SLACK_WEBHOOK_URL_PRIVATE}"
  needs:
    - vuln-schedule
  when: on_failure
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

packages:
  stage: build
  extends:
    - .npm_cache
  #  - .tag
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
    - key: "$CI_JOB_NAME-$CI_COMMIT_BRANCH"
      paths:
        - .turbo/cache
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - packages/**/dist
      - packages/**/README.md
      - packages/**/LICENSE.md
      - packages/**/CHANGELOG.md
      - packages/**/*.png
      - packages/**/*.svg
      - packages/**/index.js
  needs:
    - install
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

storybook:
  stage: build
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run build:storybook
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - apps/storybook/storybook-static
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

astro:
  stage: build
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci --cache .npm
    - npm run build:astro
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
    - key: "$CI_JOB_NAME-$CI_COMMIT_BRANCH"
      paths:
        - apps/astro/dist/
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - apps/astro/dist
  dependencies:
    - packages
  needs:
    - install
    - packages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

docker:
  stage: build
  extends: .platon-docker-build
  dependencies:
    - astro
    - storybook
  needs:
    - astro
    - storybook
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

.deploy:
  script:
    - deploy deployment.yml
  dependencies:
    - docker

review:
  stage: deploy
  extends:
    - .review
    - .deploy
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_MERGE_REQUEST_IID
      when: on_success
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

stop_review:
  stage: .post
  extends:
    - .stop_review
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

prod:
  stage: deploy
  extends:
    - .production
    - .deploy
  variables:
    REPLICAS: "3"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success

.tag:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_TAG

release-prepare:
  stage: .pre
  extends: .tag
  before_script:
    - PACKAGE_NAME=$(echo "$CI_COMMIT_TAG" | sed -e "s/^@sikt\/sds-//" -e "s/^@sikt\///" -e "s/-sds@[0-9]*.[0-9]*.[0-9]*$//" -e "s/@[0-9]*.[0-9]*.[0-9]*$//")
  script:
    - echo "PACKAGE_NAME=$PACKAGE_NAME" >> variables.env
  artifacts:
    reports:
      dotenv: variables.env

release:
  stage: .post
  extends: .tag
  image: registry.gitlab.com/gitlab-org/release-cli
  script:
    - echo "Release $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "./packages/${PACKAGE_NAME}/CHANGELOG.md"

publish-npm:
  stage: .post
  extends: .tag
  id_tokens:
    VAULT_ID_TOKEN:
      aud: $VAULT_SERVER_URL
  secrets:
    NPM_TOKEN:
      vault: "gitlab/${CI_PROJECT_PATH}/npm-token@secret"
      token: $VAULT_ID_TOKEN
      file: false
  before_script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
  script:
    - npm publish --workspace=packages/${PACKAGE_NAME} --access public
  dependencies:
    - packages
    - release-prepare
  needs:
    - packages
    - release-prepare
    - release

release-report:
  stage: .post
  extends: .tag
  script:
    - >
      curl --request POST --header "Content-Type: application/json" --data "{\"text\":\"Release <https://${CI_SERVER_HOST}/${CI_PROJECT_PATH}/-/releases/${CI_COMMIT_TAG}|$CI_COMMIT_TAG> succeeded on $CI_COMMIT_BRANCH <$CI_PIPELINE_URL|$CI_PIPELINE_ID>\"}" "${SLACK_WEBHOOK_URL_PUBLIC}"
  needs:
    - publish-npm

publish-figma:
  stage: .post
  id_tokens:
    VAULT_ID_TOKEN:
      aud: $VAULT_SERVER_URL
  secrets:
    FIGMA_TOKEN:
      vault: "gitlab/${CI_PROJECT_PATH}/figma-token@secret"
      token: $VAULT_ID_TOKEN
      file: false
  script:
    - npm pkg delete scripts.prepare
    - npm pkg delete scripts.postinstall
    - npm ci --cache .npm
    - npx figma connect publish --token ${FIGMA_TOKEN}
    - npx figma connect publish --token ${FIGMA_TOKEN} --config figma.html.config.json
  needs:
    - install
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - packages/**/figma/*.figma.tsx
        - packages/**/figma/*.react.tsx
        - packages/**/figma/*.html.ts
