image: node:18

include:
  - project: "asm/gitlab-ci-helpers"
    file: "/gitlab-ci-helpers.yml"

variables:
  KUBE_PROD_DOMAIN: horisont.paas2.uninett.no
  KUBE_TEST_ID: horisont
  HTTP_PORT: "80"
  REPLICAS: "1"

stages:
  - install
  - test
  - build
  - deploy

install:
  stage: install
  script:
    - npm pkg delete scripts.prepare
    - npm ci
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    untracked: true
    expire_in: 30 mins
    paths:
      - node_modules

lint:
  stage: test
  script:
    - npm run lint
  dependencies:
    - install
  needs:
    - install

test:
  stage: test
  script:
    - npm run test
  dependencies:
    - install
  needs:
    - install

