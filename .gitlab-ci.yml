default:
  image: node:18

include:
  - project: "asm/gitlab-ci-helpers"
    file: "/gitlab-ci-helpers.yml"

variables:
  KUBE_PROD_DOMAIN: designsystem.sikt.no
  KUBE_TEST_ID: komponentbibliotek
  HTTP_PORT: "80"
  REPLICAS: "1"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

.npm_cache:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm
    policy: pull

stages:
  - .pre
  - build
  - test
  - deploy
  #  - release
  - .post

#.publish:
#  rules:
#    - if: $CI_COMMIT_TAG
#  only:
#    - main
#  except:
#    - schedules

install:
  stage: .pre
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
  cache:
    policy: pull-push
  except:
    - schedules

lint:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run lint
  needs:
    - install
  except:
    - schedules

test:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run test
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    expire_in: 1 days
    reports:
      junit:
        - junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  needs:
    - install
  except:
    - schedules

.vuln:
  stage: test
  extends: .imagescan
  script:
    - trivy fs --cache-dir .trivycache/ --dependency-tree ./
    - trivy fs --cache-dir .trivycache/ -f json -o gl-container-scanning-report.json ./
    - trivy fs --cache-dir .trivycache/ --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./
  cache:
    paths:
      - .trivycache/
  artifacts:
    expire_in: 1 days
    when: always
    reports:
      container_scanning: gl-container-scanning-report.json
  needs: []

vuln:
  extends: .vuln
  allow_failure: true
  except:
    - schedules

vuln-schedule:
  extends: .vuln
  allow_failure: false
  only:
    - schedules

vuln-schedule-report:
  stage: .post
  script:
    - >
      curl --request POST --header "Content-Type: application/json" --data "{\"text\":\"Vulnerability audit failed on $CI_COMMIT_BRANCH <$CI_PIPELINE_URL|$CI_PIPELINE_ID>\"}" "${SLACK_WEBHOOK_URL_VULN_AUDIT}"
  needs:
    - vuln-schedule
  when: on_failure
  only:
    - schedules

packages:
  stage: build
  extends:
    - .npm_cache
  #  - .publish
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
    - key: "$CI_JOB_NAME-$CI_COMMIT_BRANCH"
      paths:
        - node_modules/.cache/turbo
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - packages/**/dist
      - packages/**/README.md
      - packages/**/LICENSE.md
      - packages/**/CHANGELOG.md
      - packages/**/*.png
      - packages/**/*.svg
      - packages/**/index.js
    exclude:
      - packages/__example__/*
  needs:
    - install
  except:
    - schedules

storybook:
  stage: build
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run storybook:build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - storybook/storybook-static
  needs:
    - install
  except:
    - schedules

gatsby:
  stage: build
  extends: .npm_cache
  variables:
    GATSBY_TELEMETRY_DISABLED: 1
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run gatsby:build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
    - key: "$CI_JOB_NAME-$CI_COMMIT_BRANCH"
      paths:
        - gatsby/.cache/
        - gatsby/public/
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - gatsby/public
  dependencies:
    - packages
  needs:
    - install
    - packages
  except:
    - schedules

docker:
  stage: build
  extends: .docker-build
  dependencies:
    - storybook
    - gatsby
  needs:
    - storybook
    - gatsby
  except:
    - schedules

.deploy:
  script:
    - deploy deployment.yml
  dependencies:
    - docker

review:
  stage: deploy
  extends:
    - .review
    - .deploy
  except:
    - main
    - schedules

stop_review:
  stage: .post
  extends: .stop_review
  except:
    - main
    - schedules

prod:
  stage: deploy
  extends:
    - .production
    - .deploy
  when: on_success
  variables:
    REPLICAS: "3"
  except:
    - schedules
