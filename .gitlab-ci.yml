storybook:
  stage: build
  script:
    - npm run storybook:build
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    untracked: true
    expire_in: 1 days
    paths:
      - storybook/storybook-static
  dependencies:
    - install
  needs:
    - install

docker:
  extends: .docker-build
  stage: build
  dependencies:
    - storybook
  needs:
    - storybook

review:
  extends: .review
  stage: deploy
  script:
    - deploy deployment.yml
  dependencies:
    - docker
  needs:
    - docker

stop_review:
  extends: .stop_review
  stage: deploy

prod:
  extends: .production
  stage: deploy
  script:
    - deploy deployment.yml
  dependencies:
    - docker
  needs:
    - docker
