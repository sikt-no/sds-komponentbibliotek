image: node:18

include:
  - project: "asm/gitlab-ci-helpers"
    file: "/gitlab-ci-helpers.yml"

variables:
  KUBE_PROD_DOMAIN: designsystem.sikt.no
  KUBE_TEST_ID: komponentbibliotek
  HTTP_PORT: "80"
  REPLICAS: "1"

stages:
  - prepare
  - build
  - test
  - deploy
#  - release

#.publish:
#  rules:
#    - if: $CI_COMMIT_TAG
#  only:
#    - main
#  except:
#    - schedules

install:
  stage: prepare
  script:
    - npm pkg delete scripts.prepare
    - npm ci
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    untracked: true
    expire_in: 30 mins
    paths:
      - node_modules
  except:
    - schedules

lint:
  stage: test
  script:
    - npm run lint
  dependencies:
    - install
  needs:
    - install
  except:
    - schedules

test:
  stage: test
  script:
    - npm run test
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  dependencies:
    - install
  needs:
    - install
  except:
    - schedules

.vuln:
  extends: .imagescan
  stage: test
  script:
    - trivy fs -f json -o gl-container-scanning-report.json ./
    - trivy fs --dependency-tree ./
    - trivy fs --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./
  artifacts:
    when: always
    reports:
      container_scanning: gl-container-scanning-report.json
  needs: []

vuln:
  extends: .vuln
  allow_failure: true
  except:
    - schedules

vuln-schedule:
  extends: .vuln
  allow_failure: false
  only:
    - schedules

packages:
  #  extends: .publish
  stage: build
  script:
    - npm run build
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    untracked: true
    expire_in: 1 days
    paths:
      - packages/**/*
  cache:
    - key: cache-turborepo-$CI_COMMIT_BRANCH
      fallback_keys:
        - cache-turborepo-$CI_DEFAULT_BRANCH
      paths:
        - node_modules/.cache/turbo
  dependencies:
    - install
  needs:
    - install
  except:
    - schedules

storybook:
  stage: build
  script:
    - npm run storybook:build
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    untracked: true
    expire_in: 1 days
    paths:
      - storybook/storybook-static
  dependencies:
    - install
  needs:
    - install
  except:
    - schedules

gatsby:
  stage: build
  script:
    - npm run gatsby:build
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    untracked: true
    expire_in: 1 days
    paths:
      - gatsby/public
  dependencies:
    - install
    - packages
  needs:
    - install
    - packages
  except:
    - schedules

docker:
  extends: .docker-build
  stage: build
  dependencies:
    - storybook
    - gatsby
  needs:
    - storybook
    - gatsby
  except:
    - schedules

review:
  extends: .review
  stage: deploy
  script:
    - deploy deployment.yml
  dependencies:
    - docker
  needs:
    - docker
  except:
    - schedules

stop_review:
  extends: .stop_review
  stage: deploy
  except:
    - schedules

staging:
  extends: .staging
  stage: deploy
  script:
    - deploy deployment.yml
  dependencies:
    - docker
  needs:
    - docker
  except:
    - schedules

prod:
  extends: .production
  stage: deploy
  variables:
    REPLICAS: "3"
  script:
    - deploy deployment.yml
  dependencies:
    - docker
  needs:
    - docker
  except:
    - schedules
