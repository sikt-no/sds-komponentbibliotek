default:
  image: node:20.14.0
  interruptible: true

include:
  - project: "asm/gitlab-ci-helpers"
    file: "/gitlab-ci-helpers.yml"

variables:
  KUBE_PROD_DOMAIN: designsystem.sikt.no
  KUBE_TEST_ID: komponentbibliotek
  HTTP_PORT: "80"
  REPLICAS: "1"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

.npm_cache:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm
    policy: pull

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

stages:
  - .pre
  - build
  - test
  - deploy
  - .post

install:
  stage: .pre
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
  cache:
    policy: pull-push
  except:
    - schedules

lint:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run lint
  needs:
    - install
  except:
    - schedules

test-unit:
  stage: test
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run test
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    expire_in: 1 days
    reports:
      junit:
        - junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  needs:
    - install
    - packages
  except:
    - schedules

test-e2e:
  stage: test
  #  image: mcr.microsoft.com/playwright:v1.40.0-jammy
  extends: .npm_cache
  parallel:
    matrix:
      - SHARD_INDEX: [1, 2, 3, 4, 5]
        SHARD_TOTAL: 5
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npx playwright install --with-deps
    - npm run test:e2e -- --shard=$SHARD_INDEX/$SHARD_TOTAL
  artifacts:
    expire_in: 1 days
    paths:
      - playwright/
    reports:
      junit:
        - results.xml
    when: always
  needs:
    - install
    - packages
  except:
    - schedules

.vuln:
  stage: test
  extends: .imagescan
  script:
    - trivy fs --cache-dir .trivycache/ --dependency-tree ./
    - trivy fs --cache-dir .trivycache/ -f json -o gl-container-scanning-report.json ./
    - trivy fs --cache-dir .trivycache/ --severity MEDIUM,HIGH,CRITICAL --exit-code 1 ./
  cache:
    paths:
      - .trivycache/
  artifacts:
    expire_in: 1 days
    when: always
    reports:
      container_scanning: gl-container-scanning-report.json
  needs: []

vuln:
  extends: .vuln
  allow_failure: true
  except:
    - schedules

vuln-schedule:
  extends: .vuln
  allow_failure: false
  only:
    - schedules

vuln-schedule-report:
  stage: .post
  script:
    - >
      curl --request POST --header "Content-Type: application/json" --data "{\"text\":\"Vulnerability audit failed on $CI_COMMIT_BRANCH <$CI_PIPELINE_URL|$CI_PIPELINE_ID>\"}" "${SLACK_WEBHOOK_URL_PRIVATE}"
  needs:
    - vuln-schedule
  when: on_failure
  only:
    - schedules

packages:
  stage: build
  extends:
    - .npm_cache
  #  - .tag
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
    - key: "$CI_JOB_NAME-$CI_COMMIT_BRANCH"
      paths:
        - node_modules/.cache/turbo
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - packages/**/dist
      - packages/**/README.md
      - packages/**/LICENSE.md
      - packages/**/CHANGELOG.md
      - packages/**/*.png
      - packages/**/*.svg
      - packages/**/index.js
  needs:
    - install
  except:
    - schedules

storybook:
  stage: build
  extends: .npm_cache
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run storybook:build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - storybook/storybook-static
  needs:
    - install
    - packages
  except:
    - schedules
    - tags

gatsby:
  stage: build
  extends: .npm_cache
  variables:
    GATSBY_TELEMETRY_DISABLED: 1
  script:
    - npm pkg delete scripts.prepare
    - npm ci
    - npm run gatsby:build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
      policy: pull
    - key: "$CI_JOB_NAME-$CI_COMMIT_BRANCH"
      paths:
        - gatsby/.cache/
        - gatsby/public/
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 days
    paths:
      - gatsby/public
  dependencies:
    - packages
  needs:
    - install
    - packages
  except:
    - schedules
    - tags

docker:
  stage: build
  extends: .docker-build
  dependencies:
    - storybook
    - gatsby
  needs:
    - storybook
    - gatsby
  except:
    - schedules
    - tags

.deploy:
  script:
    - deploy deployment.yml
  dependencies:
    - docker

.review-default:
  only:
    - branches
  except:
    - main
    - schedules

review:
  stage: deploy
  extends:
    - .review
    - .review-default
    - .deploy
  only:
    - branches
    - merge_requests

stop_review:
  stage: .post
  extends:
    - .stop_review
    - .review-default

prod:
  stage: deploy
  extends:
    - .production
    - .deploy
  when: on_success
  variables:
    REPLICAS: "3"
  except:
    - schedules

.tag:
  only:
    - tags
  except:
    - schedules

release-prepare:
  stage: .pre
  extends: .tag
  before_script:
    - PACKAGE_NAME=$(echo "$CI_COMMIT_TAG" | sed -e "s/^@sikt\/sds-//" -e "s/^@sikt\///" -e "s/-sds@[0-9]*.[0-9]*.[0-9]*$//" -e "s/@[0-9]*.[0-9]*.[0-9]*$//")
  script:
    - echo "PACKAGE_NAME=$PACKAGE_NAME" >> variables.env
  artifacts:
    reports:
      dotenv: variables.env

release:
  stage: .post
  extends: .tag
  image: registry.gitlab.com/gitlab-org/release-cli
  script:
    - echo "Release $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "./packages/${PACKAGE_NAME}/CHANGELOG.md"

publish:
  stage: .post
  extends: .tag
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "https://vault.sikt.no:8200"
  secrets:
    NPM_TOKEN:
      vault: "gitlab/${CI_PROJECT_PATH}/npm-token@secret"
      token: $VAULT_ID_TOKEN
      file: false
  before_script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
  script:
    - npm publish --workspace=packages/${PACKAGE_NAME} --access public
  dependencies:
    - packages
    - release-prepare
  needs:
    - packages
    - release-prepare
    - release

release-report:
  stage: .post
  extends: .tag
  script:
    - >
      curl --request POST --header "Content-Type: application/json" --data "{\"text\":\"Tag $CI_COMMIT_TAG succeeded on $CI_COMMIT_BRANCH <$CI_PIPELINE_URL|$CI_PIPELINE_ID>\"}" "${SLACK_WEBHOOK_URL_PUBLIC}"
  needs:
    - publish
