<title>Storybook | Sikt designsystem</title>

<link rel="stylesheet" href="dist/core.css" />
<link rel="stylesheet" href="dist/header.css" />
<link rel="stylesheet" href="dist/logo.css" />

<style>
  #root > * {
    --header-height: 56px;
    --top-nav-height: calc(
      var(--sds-space-padding-tiny) * 2 +
        var(--sds-typography-body-lineheight-regular)
    );

    height: calc(
      100dvh - calc(var(--top-nav-height) + var(--header-height))
    ) !important;
  }

  /* top-nav */
  .top-nav {
    --sikt-top-nav-padding: 2px;

    background-color: var(--sds-color-brand-accent-strong);
    display: grid;
    place-items: center center;
    padding: var(--sikt-top-nav-padding) var(--sds-space-padding-small);
  }
  .top-nav__list {
    display: flex;
    gap: var(--sds-space-gap-medium);
    list-style: none;
  }
  @media (width >= 720px) {
    .top-nav {
      --sikt-top-nav-padding: var(--sds-space-padding-tiny);
    }
  }
</style>

<div>
