server {
  listen 80;
  server_name localhost;
  absolute_redirect off;
  root /usr/share/nginx/html;

  gzip on;
  gzip_min_length 1000;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    font/woff
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  location = /storybook {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location = /monstre {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location /monstre/ {
    return 307 https://www.figma.com/file/6AVtxjDULlUdl9F4JEHAfv/Komponentbibliotek-v1.0?type=design&node-id=1492-6437&mode=design&t=oT1QKjlQkPRrAxzc-0;
  }
}
