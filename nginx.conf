server {
  listen 80;
  server_name localhost;
  absolute_redirect off;
  root /usr/share/nginx/html;

  location = /komponenter {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location = /retningslinjer {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location /retningslinjer/ {
    return 301 https://www.figma.com/file/6AVtxjDULlUdl9F4JEHAfv/Komponentbibliotek-v0.1?node-id=473%3A5830;
  }
}
