server {
  listen 80;
  server_name localhost;
  error_page 404 /404;
  error_page 500 /500;
  absolute_redirect off;
  root /usr/share/nginx/html;

  gzip on;
  gzip_min_length 1000;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    font/woff
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  location / {
    try_files $uri $uri/ =404;
  }

  location = /storybook {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location = /monstre {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location /monstre/ {
    return 307 https://www.figma.com/design/RMhyuuEhXZ4vbKVrLQr4t4/SDS-Komponentbibliotek-2.0.0?node-id=1492-6437;
  }
}
