server {
  listen 80;
  server_name localhost;
  absolute_redirect off;
  root /usr/share/nginx/html;

  location = /komponenter {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location = /retningslinjer {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location /retningslinjer/ {
    return 307 https://www.figma.com/proto/6AVtxjDULlUdl9F4JEHAfv/Komponentbibliotek-v1.0?page-id=3716%3A12831&node-id=3716-12833&viewport=43%2C4787%2C0.23&scaling=min-zoom&starting-point-node-id=3716%3A12833;
  }
}
