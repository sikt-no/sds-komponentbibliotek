server {
  listen 80;
  server_name localhost;
  error_page 403 =404 /404.html;
  error_page 404 /404.html;
  error_page 500 /500.html;
  absolute_redirect off;
  root /usr/share/nginx/html;

  gzip on;
  gzip_min_length 1000;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    font/woff
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  location / {
    try_files $uri $uri/ =404;
  }

  location = /storybook {
    rewrite ^([^.]*[^/])$ $1/ permanent;
  }

  location /storybook/ {
    add_header Access-Control-Allow-Origin http://localhost:6006;
  }
}
